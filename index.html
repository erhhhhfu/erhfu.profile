      const Icons = {

      const COLORS = {
        primary: "#FFB400",
        secondary: "#FF6B6B",
        tertiary: "#2A9D8F",
        lineGreen: "#06C755",
        cubeGrey: "#888888",
        dark: "#2D3436",
      };

      const getYoutubeId = (url) => {
        const regExp =
          /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return match && match[2].length === 11 ? match[2] : null;
      };

      const ImageCarousel = ({ images }) => {
        const [currentIndex, setCurrentIndex] = useState(0);
        const [touchStart, setTouchStart] = useState(null);
        const [touchEnd, setTouchEnd] = useState(null);

        const minSwipeDistance = 50;

        useEffect(() => {
          if (!images || images.length === 0) return;
          const timer = setInterval(() => {
            setCurrentIndex((p) => (p + 1) % images.length);
          }, 4000);
          return () => clearInterval(timer);
        }, [images, currentIndex]);

        const onTouchStart = (e) => {
          setTouchEnd(null);
          setTouchStart(e.targetTouches[0].clientX);
        };

        const onTouchMove = (e) => {
          setTouchEnd(e.targetTouches[0].clientX);
        };

        const onTouchEnd = () => {
          if (!touchStart || !touchEnd) return;
          const distance = touchStart - touchEnd;
          const isLeftSwipe = distance > minSwipeDistance;
          const isRightSwipe = distance < -minSwipeDistance;

          if (isLeftSwipe) {
            setCurrentIndex((p) => (p + 1) % images.length);
          }
          if (isRightSwipe) {
            setCurrentIndex((p) => (p - 1 + images.length) % images.length);
          }
        };

        if (!images || images.length === 0) return null;

        return (
          <div
            className="absolute inset-0 w-full h-full bg-black touch-pan-y"
            onTouchStart={onTouchStart}
            onTouchMove={onTouchMove}
            onTouchEnd={onTouchEnd}
          >
            {images.map((img, index) => (
              <div
                key={index}
                className={`absolute inset-0 w-full h-full transition-opacity duration-1000 ease-in-out ${
                  index === currentIndex ? "opacity-100" : "opacity-0"
                }`}
              >
                <img
                  src={img}
                  className="w-full h-full object-cover"
                  alt="Slide"
                />
              </div>
            ))}
            <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20">
              {images.map((_, index) => (
                <button
                  key={index}
                  onClick={() => setCurrentIndex(index)}
                  className={`w-1.5 h-1.5 rounded-full transition-all duration-300 ${
                    index === currentIndex
                      ? "bg-white w-4"
                      : "bg-white/40 hover:bg-white/70"
                  }`}
                />
              ))}
            </div>
          </div>
        );
      };

      const PortfolioItem = ({
        title,
        brand,
        company,
        role,
        tag,
        painPoint,
        solution,
        videoUrl,
        images,
        color,
        index,
        extraLink,
        extraLinkText,
        ctaText = "Watch Case Study",
      }) => {
        const [isInView, setIsInView] = useState(false);
        const [isManualPlay, setIsManualPlay] = useState(false);
        const sectionRef = useRef(null);
        const youtubeId = getYoutubeId(videoUrl);
        const isVideo = !!youtubeId;
        const isReverse = index % 2 !== 0;

        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setIsInView(true);
              } else {
                setIsInView(false);
                setIsManualPlay(false);
              }
            },
            { threshold: 0.3 }
          );
          if (sectionRef.current) observer.observe(sectionRef.current);
          return () => observer.disconnect();
        }, []);

        const handlePlayClick = (e) => {
          if (isVideo) {
            e.preventDefault();
            setIsManualPlay(true);
          }
        };

        return (
          <div
            ref={sectionRef}
            className={`min-h-screen w-full flex flex-col ${
              isReverse ? "md:flex-row-reverse" : "md:flex-row"
            } relative overflow-hidden bg-white border-b border-gray-100`}
          >
            <div className="w-full md:w-1/2 h-[50vh] md:h-screen flex items-center justify-center relative bg-slate-900 overflow-hidden">
              {isVideo && isInView ? (
                <div className="absolute inset-0 w-full h-full z-30 bg-black animate-fade-in">
                  <iframe
                    className="w-full h-full scale-[1.05]"
                    src={`https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=${
                      isManualPlay ? "0" : "1"
                    }&controls=${
                      isManualPlay ? "1" : "0"
                    }&loop=1&playlist=${youtubeId}&rel=0&enablejsapi=1`}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowFullScreen
                  ></iframe>
                </div>
              ) : (
                <>
                  {images && images.length > 0 ? (
                    <ImageCarousel images={images} />
                  ) : (
                    <div
                      className="absolute inset-0"
                      style={{ backgroundColor: color }}
                    >
                      <div className="absolute top-1/4 right-10 w-24 h-24 rounded-full bg-white/20 blur-xl"></div>
                      <div className="absolute bottom-1/4 left-10 w-32 h-32 rounded-full bg-black/10 blur-xl"></div>
                    </div>
                  )}
                </>
              )}

              {!isManualPlay && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">

                    <h3 className="text-xl md:text-2xl font-bold tracking-tight mb-4 text-white">
                      {brand}
                    </h3>
                    <a
                      href={videoUrl}
                      target="_blank"
                      rel="noopener noreferrer"
                      onClick={handlePlayClick}
                      className="inline-flex items-center gap-2 text-[10px] md:text-xs font-bold uppercase tracking-widest border border-white/30 bg-white/10 text-white hover:bg-white hover:text-black px-5 py-2.5 rounded-full transition-all duration-300"
                    >
                      {isVideo ? "Full Experience" : ctaText}{" "}
                      {isVideo ? <Icons.Play /> : <Icons.Link />}
                    </a>
                  </div>
                </div>
              )}

              <div
                className={`absolute top-6 ${
                  isReverse ? "right-6" : "left-6"
                } text-white/20 text-4xl font-black select-none z-10`}
              >
                0{index + 1}
              </div>
            </div>

            <div className="w-full md:w-1/2 flex flex-col justify-center px-6 md:px-16 py-12 bg-white text-slate-800">
              <div className="max-w-xl mx-auto md:mx-0">
                <div className="mb-10">
                  <span className="inline-block py-1 px-3 rounded-full text-xs font-bold tracking-widest uppercase mb-4 text-white bg-slate-800">

                  <h2 className="text-3xl md:text-5xl font-black mb-4 leading-tight tracking-wider">

                      {role && (

                        </div>

                  <p className="text-gray-500 text-sm italic mb-4 font-medium tracking-wide">

                  <div

                <div className="grid gap-8">
                  <div>

                      </div>
                      <h4 className="text-xl font-bold">痛點</h4>
                    </div>
                    <p className="text-gray-600 leading-relaxed pl-[60px] text-lg text-justify">

                  </div>

                  <div>
                    <div className="flex items-center mb-3">
                      <div className="p-2 rounded-lg mr-4 bg-gray-100">

                      </div>
                      <h4 className="text-xl font-bold">解決方案</h4>
                    </div>
                    <p className="text-gray-600 leading-relaxed pl-[60px] text-lg text-justify">

                    </p>

                    {extraLink && (
                      <div className="pl-[60px] mt-6">
                        <a
                          href={extraLink}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-2 px-6 py-2.5 border-2 border-slate-900 text-slate-900 rounded-full font-bold text-xs hover:bg-slate-900 hover:text-white transition-all shadow-sm"
                        >
                          <Icons.Link /> {extraLinkText}
                        </a>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const App = () => {

          if (el) el.scrollIntoView({ behavior: "smooth" });
          setIsMenuOpen(false);
        };

        return (
