<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>董兒馥 作品集 | Erh Fu's Portfolio</title>

    <!-- 引入 React 和 Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap");
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
    </style>
  </head>
  <body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      const { useState, useEffect, useRef } = React;

      const Icons = {
        Menu: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></svg>
        ),
        X: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18" /><path d="m6 6 12 12M6 18L18 6" /></svg>
        ),
        ArrowDown: ({ className }) => (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14" /><path d="m19 12-7 7-7-7" /></svg>
        ),
        Zap: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>
        ),
        Lightbulb: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" /><path d="M9 18h6" /><path d="M10 22h4" /></svg>
        ),
        Link: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" /></svg>
        ),
        Play: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        ),
      };

      const COLORS = {
        primary: "#FFB400",
        secondary: "#FF6B6B",
        tertiary: "#2A9D8F",
        lineGreen: "#06C755",
        cubeGrey: "#888888",
        dark: "#2D3436",
      };

      const getYoutubeId = (url) => {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return match && match[2].length === 11 ? match[2] : null;
      };

      const ImageCarousel = ({ images }) => {
        const [currentIndex, setCurrentIndex] = useState(0);
        const [touchStart, setTouchStart] = useState(null);
        const [touchEnd, setTouchEnd] = useState(null);

        const minSwipeDistance = 50;

        useEffect(() => {
          if (!images || images.length === 0) return;
          const timer = setInterval(() => {
            setCurrentIndex((p) => (p + 1) % images.length);
          }, 4000);
          return () => clearInterval(timer);
        }, [images, currentIndex]);

        const onTouchStart = (e) => {
          setTouchEnd(null);
          setTouchStart(e.targetTouches[0].clientX);
        };

        const onTouchMove = (e) => {
          setTouchEnd(e.targetTouches[0].clientX);
        };

        const onTouchEnd = () => {
          if (!touchStart || !touchEnd) return;
          const distance = touchStart - touchEnd;
          const isLeftSwipe = distance > minSwipeDistance;
          const isRightSwipe = distance < -minSwipeDistance;

          if (isLeftSwipe) {
            setCurrentIndex((p) => (p + 1) % images.length);
          }
          if (isRightSwipe) {
            setCurrentIndex((p) => (p - 1 + images.length) % images.length);
          }
        };

        if (!images || images.length === 0) return null;

        return (
          <div
            className="absolute inset-0 w-full h-full bg-black touch-pan-y"
            onTouchStart={onTouchStart}
            onTouchMove={onTouchMove}
            onTouchEnd={onTouchEnd}
          >
            {images.map((img, index) => (
              <div
                key={index}
                className={`absolute inset-0 w-full h-full transition-opacity duration-1000 ease-in-out ${
                  index === currentIndex ? "opacity-100" : "opacity-0"
                }`}
              >
                <img src={img} className="w-full h-full object-cover" alt="Slide" />
              </div>
            ))}
            <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20">
              {images.map((_, index) => (
                <button
                  key={index}
                  onClick={() => setCurrentIndex(index)}
                  className={`w-1.5 h-1.5 rounded-full transition-all duration-300 ${
                    index === currentIndex ? "bg-white w-4" : "bg-white/40 hover:bg-white/70"
                  }`}
                />
              ))}
            </div>
          </div>
        );
      };

      const PortfolioItem = ({
        title, brand, company, role, tag, painPoint, solution, videoUrl, images, color, index, extraLink, extraLinkText, ctaText = "Watch Case Study",
      }) => {
        const [isInView, setIsInView] = useState(false);
        const [isManualPlay, setIsManualPlay] = useState(false);
        const sectionRef = useRef(null);
        const youtubeId = getYoutubeId(videoUrl);
        const isVideo = !!youtubeId;
        const isReverse = index % 2 !== 0;

        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setIsInView(true);
              } else {
                setIsInView(false);
                setIsManualPlay(false);
              }
            },
            { threshold: 0.3 }
          );
          if (sectionRef.current) observer.observe(sectionRef.current);
          return () => observer.disconnect();
        }, []);

        const handlePlayClick = (e) => {
          if (isVideo) {
            e.preventDefault();
            setIsManualPlay(true);
          }
        };

        return (
          <div ref={sectionRef} className={`min-h-screen w-full flex flex-col ${isReverse ? "md:flex-row-reverse" : "md:flex-row"} relative overflow-hidden bg-white border-b border-gray-100`}>
            <div className="w-full md:w-1/2 h-[50vh] md:h-screen flex items-center justify-center relative bg-slate-900 overflow-hidden">
              {isVideo && isInView ? (
                <div className="absolute inset-0 w-full h-full z-30 bg-black animate-fade-in">
                  <iframe
                    className="w-full h-full scale-[1.05]"
                    src={`https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=${isManualPlay ? "0" : "1"}&controls=${isManualPlay ? "1" : "0"}&loop=1&playlist=${youtubeId}&rel=0&enablejsapi=1`}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowFullScreen
                  ></iframe>
                </div>
              ) : (
                <>
                  {images && images.length > 0 ? (
                    <ImageCarousel images={images} />
                  ) : (
                    <div className="absolute inset-0" style={{ backgroundColor: color }}>
                      <div className="absolute top-1/4 right-10 w-24 h-24 rounded-full bg-white/20 blur-xl"></div>
                      <div className="absolute bottom-1/4 left-10 w-32 h-32 rounded-full bg-black/10 blur-xl"></div>
                    </div>
                  )}
                </>
              )}

              {!isManualPlay && (
                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                  <div className="bg-black/40 p-6 rounded-xl backdrop-blur-md border border-white/10 shadow-2xl text-center max-w-xs w-full pointer-events-auto mx-4">
                    <h3 className="text-xl md:text-2xl font-bold tracking-tight mb-4 text-white">{brand}</h3>
                    <a
                      href={videoUrl}
                      target="_blank"
                      rel="noopener noreferrer"
                      onClick={handlePlayClick}
                      className="inline-flex items-center gap-2 text-[10px] md:text-xs font-bold uppercase tracking-widest border border-white/30 bg-white/10 text-white hover:bg-white hover:text-black px-5 py-2.5 rounded-full transition-all duration-300"
                    >
                      {isVideo ? "Full Experience" : ctaText} {isVideo ? <Icons.Play /> : <Icons.Link />}
                    </a>
                  </div>
                </div>
              )}

              <div className={`absolute top-6 ${isReverse ? "right-6" : "left-6"} text-white/20 text-4xl font-black select-none z-10`}>
                0{index + 1}
              </div>
            </div>

            <div className="w-full md:w-1/2 flex flex-col justify-center px-6 md:px-16 py-12 bg-white text-slate-800">
              <div className="max-w-xl mx-auto md:mx-0">
                <div className="mb-10">
                  <div className="inline-block py-2 px-4 rounded-full text-xs font-bold tracking-widest uppercase mb-6 text-slate-900 bg-gray-100 border border-gray-200">
                    {company} ｜ {role}
                  </div>
                  
                  <h2 className="text-3xl md:text-5xl font-black mb-4 leading-tight tracking-wider">
                    {title}
                  </h2>

                  <p className="text-gray-500 text-sm italic mb-4 font-medium tracking-wide">
                    {tag}
                  </p>
                  <div className="h-1 w-20 mt-4" style={{ backgroundColor: color }}></div>
                </div>

                <div className="grid gap-8">
                  <div>
                    <div className="flex items-center mb-3">
                      <div className="p-2 rounded-lg mr-4 bg-gray-100"><Icons.Zap /></div>
                      <h4 className="text-xl font-bold">痛點</h4>
                    </div>
                    <p className="text-gray-600 leading-relaxed pl-[60px] text-lg text-justify">{painPoint}</p>
                  </div>

                  <div>
                    <div className="flex items-center mb-3">
                      <div className="p-2 rounded-lg mr-4 bg-gray-100"><Icons.Lightbulb /></div>
                      <h4 className="text-xl font-bold">解決方案</h4>
                    </div>
                    <p className="text-gray-600 leading-relaxed pl-[60px] text-lg text-justify">{solution}</p>

                    {extraLink && (
                      <div className="pl-[60px] mt-6">
                        <a
                          href={extraLink}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-2 px-6 py-2.5 border-2 border-slate-900 text-slate-900 rounded-full font-bold text-xs hover:bg-slate-900 hover:text-white transition-all shadow-sm"
                        >
                          <Icons.Link /> {extraLinkText}
                        </a>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const App = () => {

        const [isMenuOpen, setIsMenuOpen] = useState(false);

        const cases = [
          {
            brand: "大安站台式居酒屋",
            shortTitle: "展店專案企劃",

            tag: "#實體空間營運 #供應商聯繫 #行銷選品 #品牌定位 #團隊組織建立",
            title: "實體餐廳展店專案企劃",
            painPoint: "如何在延續品牌價值和商品完全不同之間取得平衡。另外面臨複雜的人力管理與作業流程，需一套可複製的營運模式以維持品牌水準。",
            solution: "兩年間穩定推進專案，從選址策略、販售商品策略定位以及大量聯繫供應商到正式開幕，成功創造兩店月營收達新台幣兩百萬元。導入 POS 與訂位系統驅動數位轉型，設計叫貨系統與 SOP，有效解決人力痛點，提升 20 人團隊協作效率與服務穩定度。",
            videoUrl: "https://maps.app.goo.gl/i3FGrpM32vkQM3Tj7",
            color: COLORS.tertiary,
            ctaText: "View Brand Location",
            images: [
              "https://upload.cc/i1/2026/02/11/54Bxod.jpg",
              "https://upload.cc/i1/2026/02/11/QaPk9x.jpg",
              "https://upload.cc/i1/2026/02/11/GgckJM.jpg",
              "https://upload.cc/i1/2026/02/11/FUIZ1Y.jpg",
              "https://upload.cc/i1/2026/02/11/qNkDTA.jpg",
            ],
          },
          {
            brand: "SUNMAI 金色三麥｜鐵粉英雄",
            shortTitle: "社群經營",
            company: "夢之怪物廣告代理商",

            tag: #社群經營 #小編維運 #媒體投放",
            title: "小編經營與產品銷售提升",
            painPoint: "疫情初期因市場波動導致特定酒款缺貨，商品缺話成為品牌負面情緒，需化解品牌在零售通路的負面觀感，並增加小編好感度。",
            solution: "透過社群人格化經營，以第一線導航員身份解決粉絲購酒需求，將真實互動轉譯為廣告素材，榮獲 4A 廣告獎金獎肯定，成功帶動通路產品銷售，後續管理媒體投放預算透過數據分析優化 CPC、CPM 指標，加強產品銷售",
            videoUrl: "https://www.youtube.com/watch?v=RGihYGoqGO8",
            extraLink: "https://www.facebook.com/lebledor.brewhouse/videos/888178941699462/",
            extraLinkText: "精彩小編互動原文",
            color: COLORS.primary,
          },
          {
            brand: "SUNMAI 金色三麥｜疫情下的陪伴",
            shortTitle: "社群策略",
            company: "夢之怪物廣告代理商",
            role: "行銷企劃",
            tag: "#敏捷行銷 #時事造題 #媒體投放",
            title: "跟緊時事行銷策略大量提升產品銷售",
            painPoint: "2020 年疫情爆發，既定素材與歡聚情境已不合時宜，品牌面臨銷售下滑與社群消聲的重大危機。",
            solution: "採取敏捷行銷策略調整內容架構，針對疫情時事推出趣味素材，成功將品牌訊息融入消費者的居家生活。透過拆解產品賣點，結合消費者心理洞察，維持高黏著度社群互動機制，確保品牌溫度與心佔率，實現商業目標轉化。",
            videoUrl: "https://www.youtube.com/watch?v=ndX6hAbyPK0",
            color: COLORS.secondary,
          },
          {
            brand: "LINE 禮物｜宅配禮",
            shortTitle: "產品上架行銷",
            company: "夢之怪物廣告代理商",
            role: "行銷企劃",
            tag: "#產品行銷 #新功能落地 #創意發想",
            title: "新功能上市強化社群定位",
            painPoint: "品牌推出宅配禮新功能，消費者對「送禮後自行填寫地址」的行為模式認知門檻高，影響轉換率。",
            solution: "深度參與品牌電視廣告策略定位與發想，提出「即時禮，到心裡」之核心溝通主張。透過多元情境演繹與高頻次數位曝光，建立消費者新使用習慣，強化品牌在送禮市場的數位定位。",
            videoUrl: "https://www.youtube.com/watch?v=BcQ7aJjy920",
            color: COLORS.lineGreen,
          },
          {
            brand: "上海瓶行宇宙｜為想要的世界買單",
            shortTitle: "大型活動企劃",
            company: "瓶行宇宙",
            role: "專案經理",
            tag: "#SDGs #整合策展 #電商營運",
            title: "議題轉化的商業大型活動",
            painPoint: "SDG 永續概念過於抽象且生硬，難以產生大眾共鳴，且面臨國際品牌聯動的複雜溝通挑戰。",
            solution: "打造 3,000 平米體驗式策展，聯動 IKEA 與網易新聞等國際品牌，三日觸及 1.8 億人次。負責淘寶商店營運，透過精準選品策略提升店鋪信任度 10 倍。榮獲「造物神殿」最高殊榮，展期創造營收較同期成長 200 倍之佳績。",
            videoUrl: "https://www.bilibili.com/video/BV1nb411q7Ps/",
            color: COLORS.cubeGrey,
            images: [
              "https://upload.cc/i1/2026/02/11/WE97yv.png",
              "https://upload.cc/i1/2026/02/11/fFOdTt.png",
              "https://upload.cc/i1/2026/02/11/ovISj8.png",
            ],
          },
        ];

        const scrollToCase = (i) => {
          setActiveCase(i);
          const el = document.getElementById(`case-${i}`);
          if (el) el.scrollIntoView({ behavior: "smooth" });
          setIsMenuOpen(false);
        };

        return (
          <div className="font-sans antialiased text-gray-900 bg-white">
            <nav className="fixed top-0 left-0 w-full z-50 px-6 py-6 flex justify-between items-center mix-blend-difference text-white">
              <div
                className="text-xl font-black tracking-tighter cursor-pointer"
                onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
              >
                ERH FU.
              </div>
              <div className="hidden md:flex space-x-8 text-sm font-bold tracking-widest uppercase">
                {cases.map((c, i) => (
                  <button
                    key={i}
                    onClick={() => scrollToCase(i)}
                    className={`hover:text-gray-300 transition-colors ${activeCase === i ? "border-b-2 border-white" : ""}`}
                  >
                    {c.shortTitle || `Case 0${i + 1}`}
                  </button>
                ))}
              </div>
              <button className="md:hidden text-white" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                <Icons.Menu />
              </button>
            </nav>

            {isMenuOpen && (
              <div className="fixed inset-0 bg-black z-40 flex flex-col items-center justify-center space-y-8 text-white">
                {cases.map((c, i) => (
                  <button key={i} onClick={() => scrollToCase(i)} className="text-3xl font-bold">
                    {c.shortTitle || `Case 0${i + 1}`}
                  </button>
                ))}
                <button className="text-xl text-gray-500 mt-8" onClick={() => setIsMenuOpen(false)}>
                  Close
                </button>
              </div>
            )}

            <header className="h-[60vh] w-full flex flex-col justify-center items-center relative bg-white px-6 overflow-hidden">
              <div className="max-w-5xl z-10 text-center animate-fade-in">
                <p className="text-xs md:text-sm font-bold tracking-[0.4em] uppercase mb-8 text-gray-400">
                  Erh Fu's Portfolio
                </p>
                <h1 className="text-5xl md:text-8xl font-black mb-8 leading-tight tracking-tighter text-slate-900">
                  董 兒 馥<br />
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#2A9D8F] via-[#E76F51] to-[#FFB400]">
                    作品集
                  </span>
                </h1>

                <button
                  onClick={() => scrollToCase(0)}
                  className="group flex items-center gap-3 px-8 py-4 bg-slate-900 text-white rounded-full font-bold hover:bg-slate-800 transition-all shadow-xl mx-auto"
                >
                  👀 查看案例
                  <Icons.ArrowDown className="w-5 h-5 group-hover:translate-y-1 transition-transform" />
                </button>
              </div>
              <div className="absolute top-0 right-0 w-1/2 h-full bg-gray-50 -z-0 skew-x-12 opacity-50 translate-x-1/3 pointer-events-none"></div>
            </header>

            <main>
              {cases.map((item, index) => (
                <section id={`case-${index}`} key={index}>
                  <PortfolioItem {...item} index={index} />
                </section>
              ))}
            </main>

            <footer className="py-24 bg-slate-900 text-white text-center px-6">
              <div className="max-w-2xl mx-auto">
                <h2 className="text-3xl md:text-4xl font-bold mb-8">
                  Do Goooooood ,Have Fuuuuuuuuuun
                </h2>
                <div className="flex flex-col md:flex-row justify-center gap-6">
                  <a
                    href="mailto:alice47272003@gmail.com"
                    className="px-8 py-4 bg-white text-slate-900 rounded-full font-bold hover:bg-gray-200 transition-all shadow-xl"
                  >
                    Email Me
                  </a>
                </div>
                <div className="mt-20 text-xs text-gray-600 tracking-widest uppercase">
                  © 2026 Erh Fu Portfolio. Built with Logic & Creativity.
                </div>
              </div>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
